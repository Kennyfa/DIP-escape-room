<!doctype html>
<html>
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Joker's Final Test</title>
    <link rel="stylesheet" href="style.css" />
  </head>

  <body>
    <div id="startupModal" class="modal">
      <div class="modal-content">
        <h2>Final Instruction</h2>
        <p>Vision can be deceived.</p>
        <p>Signals can be distorted.</p>
        <p><strong>Only one sense will guide you now.</strong></p>
        <p>Turn up your volume.</p>
        <button onclick="startExperience()">Continue</button>
      </div>
    </div>

    <h1>Joker's Final Test</h1>

    <p>
      You want the right answer. <br />
      But there isn't one. <br />
      There are only consequences. <br />
      <br />
      Tune the chaos and see what you've become.
    </p>

    <div class="panel">
      <label>Perception</label>
      <input type="range" min="0" max="9" value="0" id="freqSlider" />
      <span id="freqVal">0</span>

      <br /><br />

      <label>Judgement</label>
      <input type="range" min="0" max="9" value="0" id="ampSlider" />
      <span id="ampVal">0</span>

      <br /><br />

      <label>Consequence</label>
      <input type="range" min="0" max="9" value="0" id="phaseSlider" />
      <span id="phaseVal">0</span>

      <br /><br />

      <canvas id="waveCanvas"></canvas>

      <p class="stability-label">Chaos Stability</p>

      <div class="meter">
        <div id="meterFill"></div>
      </div>

      <p><span id="matchPercent">0%</span></p>

      <button onclick="checkSignal()">Reveal the consequence</button>
    </div>

    <h2 id="result"></h2>

    <script src="puzzle.js"></script>
  </body>
</html>
